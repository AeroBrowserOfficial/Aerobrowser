<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroBrowser — Быстрый и легкий браузер</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            color: #ccc;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .download-btn {
            background: #007acc;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background: #005999;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="icon.png" alt="AeroBrowser Logo" width="120" style="margin-bottom: 20px;">
        <h1>AeroBrowser</h1>
        <p>Легкий, быстрый и современный веб-браузер нового поколения.</p>
        
        <a href="AeroBrowser-Setup.exe" class="download-btn">Скачать для Windows</a>
    </div>
</body>
</html>
